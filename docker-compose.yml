version: "3.9"

services:
  database:
    build: 
      context: ./database
    container_name: sql-clinica
    env_file:
      - ./backend/.env
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql_data_clinica:/var/opt/mssql
    restart: always

volumes:
  sql_data_clinica:
    driver: local