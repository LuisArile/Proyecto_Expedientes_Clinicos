name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/Expedientes_Clinicos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build

  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Login a ACR
        run: |
          docker login clinicacontainerregistry.azurecr.io \
            -u ${{ secrets.ACR_USERNAME }} \
            -p ${{ secrets.ACR_PASSWORD }}

      - name: Build backend
        run: docker build -t clinicacontainerregistry.azurecr.io/backend-clinica:v1 ./backend

      - name: Build frontend
        run: docker build -t clinicacontainerregistry.azurecr.io/frontend-clinica:v1 ./frontend

      - name: Push backend
        run: docker push clinicacontainerregistry.azurecr.io/backend-clinica:v1

      - name: Push frontend
        run: docker push clinicacontainerregistry.azurecr.io/frontend-clinica:v2