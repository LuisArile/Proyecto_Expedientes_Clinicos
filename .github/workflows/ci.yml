name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias backend
        run: npm install

      - name: Ejecutar pruebas backend
        run: npm test


  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/Expedientes_Clinicos

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias frontend
        run: npm install

      - name: Run ESLint
        run: npm run lint
    
      - name: Ejecutar pruebas frontend
        run: npm test
    
      - name: Build project
        run: npm run build

  deploy-backend:
    name: Deploy Backend to Azure
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Deploy a Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: clinica-backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend
