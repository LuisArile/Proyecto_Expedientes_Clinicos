name: Pipeline CI/CD Azure App Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 22

jobs:

# ==============================
# BACKEND TESTS
# ==============================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          SA_PASSWORD: Password123!
          ACCEPT_EULA: Y
        ports:
          - 1433:1433

    env:
      DATABASE_URL: sqlserver://sa:Password123!@localhost:1433;database=testdb;trustServerCertificate=true
      JWT_SECRET: test-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            nc -z localhost 1433 && echo "SQL Server ready" && exit 0
            echo "Waiting for SQL Server..."
            sleep 2
          done
          exit 1

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test


# ==============================
# FRONTEND TESTS
# ==============================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/Expedientes_Clinicos/package-lock.json

      - name: Install dependencies
        working-directory: frontend/Expedientes_Clinicos
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend/Expedientes_Clinicos
        run: npm test -- --watchAll=false

