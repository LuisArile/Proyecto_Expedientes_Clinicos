name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "deploy" para confirmar'
        required: true

jobs:

  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm test

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: frontend/Expedientes_Clinicos
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build

  docker-build-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'deploy'

    steps:
      - name: Validar rama main
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "ERROR: Este deploy solo se puede ejecutar desde la rama main"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set image tag
        run: echo "TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Login to ACR
        run: |
          docker login clinicacontainerregistry.azurecr.io \
            -u ${{ secrets.ACR_USERNAME }} \
            -p ${{ secrets.ACR_PASSWORD }}

      - name: Build backend image
        run: |
          docker build \
            -t clinicacontainerregistry.azurecr.io/backend-clinica:${{ env.TAG }} \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            --target prod \
            --build-arg VITE_API_URL=http://backend:3000 \
            -t clinicacontainerregistry.azurecr.io/frontend-clinica:${{ env.TAG }} \
            ./frontend

      - name: Push backend image
        run: |
          docker push clinicacontainerregistry.azurecr.io/backend-clinica:${{ env.TAG }}

      - name: Push frontend image
        run: |
          docker push clinicacontainerregistry.azurecr.io/frontend-clinica:${{ env.TAG }}

      - name: Deploy backend
        uses: azure/webapps-deploy@v2
        with:
          app-name: clinica-backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          images: clinicacontainerregistry.azurecr.io/backend-clinica:${{ env.TAG }}

      - name: Deploy frontend
        uses: azure/webapps-deploy@v2
        with:
          app-name: clinica-frontend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND }}
          images: clinicacontainerregistry.azurecr.io/frontend-clinica:${{ env.TAG }}